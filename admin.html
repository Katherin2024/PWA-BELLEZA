<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body style="display:none;">

<header class="header">

<div class="logo">💅 Belleza Admin</div>

<nav class="menu">

<a href="#agregar">Agregar</a>
<a href="#servicios">Servicios</a>
<a href="#citas">Citas</a>

<button
class="btn-solid"
onclick="cerrarSesion()">
Cerrar sesión
</button>

</nav>

</header>

<h1 class="titulo">
Panel Administrador 👩‍💼
</h1>

<!-- AGREGAR -->
<section id="agregar">

<div class="admin-box">

<h2>Agregar Servicio 💅</h2>

<input
type="text"
id="nombre"
placeholder="Nombre del servicio">

<input
type="number"
id="precio"
placeholder="Precio">

<input
type="text"
id="duracion"
placeholder="Duración">

<select id="categoria">

<option value="">
Selecciona categoría
</option>

<option value="uñas">Uñas</option>
<option value="cejas">Cejas</option>
<option value="depilacion">Depilación</option>
<option value="pestañas">Pestañas</option>

</select>

<button onclick="agregarServicio()">
Agregar Servicio
</button>

</div>

</section>

<!-- SERVICIOS -->
<section id="servicios">

<h2 class="titulo">
Servicios Registrados 💖
</h2>

<div
id="listaServicios"
class="admin-list">
</div>

</section>

<!-- CITAS -->
<section id="citas">

<h2 class="titulo">
Citas de Clientes 📅
</h2>

<div
id="listaCitas"
class="admin-list citas">
</div>

</section>

<a href="#agregar"
class="btn-subir-admin">↑</a>

<script type="module">

import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { app }
from "./js/firebase-config.js";

const db =
getFirestore(app);

const auth =
getAuth(app);

/* =========================
VALIDAR ADMIN
========================= */
onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href =
"login.html";
return;
}

if(
user.email !==
"heidy.avilesp@uniagustiniana.edu.co"
){
window.location.href =
"index.html";
return;
}

document.body.style.display =
"block";

cargarServicios();
cargarCitas();

});

/* =========================
CERRAR
========================= */
window.cerrarSesion = ()=>{

signOut(auth).then(()=>{

window.location.href =
"login.html";

});

};

/* =========================
AGREGAR SERVICIO
========================= */
window.agregarServicio =
async()=>{

const nombre =
document.getElementById("nombre").value;

const precio =
document.getElementById("precio").value;

const duracion =
document.getElementById("duracion").value;

const categoria =
document.getElementById("categoria").value;

if(
!nombre ||
!precio ||
!duracion ||
!categoria
){
alert(
"Completa todos los campos"
);
return;
}

await addDoc(
collection(db,"servicios"),
{
nombre,
precio:Number(precio),
duracion,
categoria
}
);

location.reload();

};

/* =========================
SERVICIOS
========================= */
async function cargarServicios(){

const contenedor =
document.getElementById(
"listaServicios"
);

const snap =
await getDocs(
collection(db,"servicios")
);

let html = "";

snap.forEach(docSnap=>{

const s =
docSnap.data();

const id =
docSnap.id;

html += `
<div class="admin-card">

<h3>${s.nombre}</h3>

<p>💰 $${s.precio}</p>

<p>⏱ ${s.duracion}</p>

<p>📌 ${s.categoria}</p>

<button onclick="editar('${id}')">
Editar ✏️
</button>

<button onclick="eliminar('${id}')">
Eliminar ❌
</button>

</div>
`;

});

contenedor.innerHTML =
html;

}

/* =========================
EDITAR
========================= */
window.editar =
async(id)=>{

const nombre =
prompt("Nuevo nombre:");

const precio =
prompt("Nuevo precio:");

const duracion =
prompt("Nueva duración:");

if(
!nombre ||
!precio ||
!duracion
)return;

await updateDoc(
doc(db,"servicios",id),
{
nombre,
precio:Number(precio),
duracion
}
);

location.reload();

};

/* =========================
ELIMINAR
========================= */
window.eliminar =
async(id)=>{

await deleteDoc(
doc(db,"servicios",id)
);

location.reload();

};

/* =========================
CARGAR CITAS
========================= */
async function cargarCitas(){

const contenedor =
document.getElementById(
"listaCitas"
);

const citasSnap =
await getDocs(
collection(db,"citas")
);

const usuariosSnap =
await getDocs(
collection(db,"usuarios")
);

let html = "";

citasSnap.forEach(docSnap=>{

const c =
docSnap.data();

const id =
docSnap.id;

let nombreCliente =
"Katherin";

let telefonoCliente =
"";

usuariosSnap.forEach(userDoc=>{

const u =
userDoc.data();

if(
u.email &&
c.usuario &&
u.email.trim().toLowerCase() ===
c.usuario.trim().toLowerCase()
){

nombreCliente =
u.nombre || "Cliente";

telefonoCliente =
u.telefono || "";

}

});

let color =
"#f1c40f";

if(c.estado==="aprobado"){
color="#00b894";
}

if(c.estado==="rechazado"){
color="#ff1744";
}

/* GOOGLE CALENDAR */
const fechaBase =
c.fecha.replaceAll("-","");

const horaInicio =
c.hora.replace(":","") + "00";

let hFin =
Math.floor((c.finMin||0)/60);

let mFin =
(c.finMin||0)%60;

if(hFin<10) hFin="0"+hFin;
if(mFin<10) mFin="0"+mFin;

const horaFin =
hFin + "" + mFin + "00";

const linkCalendar =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=Cita%20Belleza&dates=${fechaBase}T${horaInicio}/${fechaBase}T${horaFin}&details=${encodeURIComponent(c.servicio)}&location=${encodeURIComponent(c.direccion)}`;

html += `
<div class="admin-card">

<h3>${c.servicio}</h3>

<p>👤 ${nombreCliente}</p>

<p>📧 ${c.usuario}</p>

<p>📱 ${telefonoCliente}</p>

<p>📅 ${c.fecha}</p>

<p>⏰ ${c.hora}</p>

<p>📍 ${c.direccion}</p>

<p style="
background:${color};
color:white;
padding:8px;
border-radius:12px;
font-weight:bold;
">
${c.estado || "pendiente"}
</p>

<button
onclick="aprobar('${id}','${telefonoCliente}','${nombreCliente}','${c.servicio}','${c.fecha}','${c.hora}')">
Aprobar ✅
</button>

<button
onclick="rechazar('${id}','${telefonoCliente}','${nombreCliente}','${c.servicio}','${c.fecha}','${c.hora}')">
Rechazar ❌
</button>

${
c.estado==="aprobado"
?
`
<button
onclick="window.open('${linkCalendar}','_blank')">
📅 Google Calendar
</button>
`
:
""
}

</div>
`;

});

contenedor.innerHTML =
html;

}

/* =========================
APROBAR
========================= */
window.aprobar =
async(
id,
telefono,
nombre,
servicio,
fecha,
hora
)=>{

await updateDoc(
doc(db,"citas",id),
{
estado:"aprobado"
}
);

const mensaje =
encodeURIComponent(
`Hola ${nombre} 💖

Tu cita fue confirmada exitosamente ✨

💅 Servicio: ${servicio}
📅 Fecha: ${fecha}
⏰ Hora: ${hora}

Te esperamos 💖

Belleza 💅`
);

window.open(
"https://wa.me/57"+
telefono+
"?text="+mensaje,
"_blank"
);

cargarCitas();

};

/* =========================
RECHAZAR
========================= */
window.rechazar =
async(
id,
telefono,
nombre,
servicio,
fecha,
hora
)=>{

await updateDoc(
doc(db,"citas",id),
{
estado:"rechazado"
}
);

const mensaje =
encodeURIComponent(
`Hola ${nombre} 💖

Tu cita no pudo ser confirmada en ese horario ❌

💅 Servicio: ${servicio}
📅 Fecha: ${fecha}
⏰ Hora: ${hora}

Te invitamos a reservar otro horario disponible 💖

Belleza 💅`
);

window.open(
"https://wa.me/57"+
telefono+
"?text="+mensaje,
"_blank"
);

cargarCitas();

};

</script>

</body>
</html>
