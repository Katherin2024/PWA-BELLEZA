<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Configuración básica -->
    <meta charset="UTF-8">

    <!-- Responsive móvil -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Administrador</title>

    <!-- Hoja de estilos general -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ======================================================
     TITULO PRINCIPAL
====================================================== -->
<h1 class="titulo">Panel Administrador 👩‍💼</h1>

<!-- ======================================================
     FORMULARIO AGREGAR SERVICIO
====================================================== -->
<div class="admin-box">

    <h2>Agregar Servicio 💅</h2>

    <!-- Nombre -->
    <input 
        type="text"
        id="nombre"
        placeholder="Nombre del servicio"
    >

    <!-- Precio -->
    <input 
        type="number"
        id="precio"
        placeholder="Precio"
    >

    <!-- Duración -->
    <input 
        type="text"
        id="duracion"
        placeholder="Duración"
    >

    <!-- Categoría -->
    <select id="categoria">

        <option value="">Selecciona categoría</option>
        <option value="uñas">Uñas</option>
        <option value="cejas">Cejas</option>
        <option value="depilacion">Depilación</option>
        <option value="pestañas">Pestañas</option>

    </select>

    <!-- Botón -->
    <button onclick="agregarServicio()">
        Agregar Servicio
    </button>

</div>

<!-- ======================================================
     SERVICIOS
====================================================== -->
<h2 class="titulo">Servicios Registrados 💖</h2>

<div id="listaServicios" class="admin-list"></div>

<!-- ======================================================
     CITAS
====================================================== -->
<h2 class="titulo">Citas de Clientes 📅</h2>

<div id="listaCitas" class="admin-list citas"></div>

<!-- ======================================================
     JAVASCRIPT FIREBASE
====================================================== -->
<script type="module">

/* ======================================================
   IMPORTAR FIREBASE
====================================================== */
import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    deleteDoc,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { app } from "./js/firebase-config.js";

/* ======================================================
   INICIALIZAR FIREBASE
====================================================== */
const db = getFirestore(app);
const auth = getAuth(app);

/* ======================================================
   VALIDAR LOGIN
====================================================== */
onAuthStateChanged(auth, (user) => {

    if(!user){
        window.location.href = "login.html";
        return;
    }

    cargarServicios();
    cargarCitas();

});

/* ======================================================
   CARGAR SERVICIOS
====================================================== */
async function cargarServicios(){

    const contenedor = document.getElementById("listaServicios");

    const snap = await getDocs(collection(db, "servicios"));

    let html = "";

    snap.forEach(docSnap => {

        const s = docSnap.data();
        const id = docSnap.id;

        html += `
            <div class="admin-card">

                <h3>${s.nombre}</h3>

                <p>💰 $${s.precio}</p>

                <p>⏱ ${s.duracion}</p>

                <p>📌 ${s.categoria}</p>

                <button onclick="editar('${id}')">
                    Editar ✏️
                </button>

                <button onclick="eliminar('${id}')">
                    Eliminar ❌
                </button>

            </div>
        `;
    });

    contenedor.innerHTML = html;
}

/* ======================================================
   AGREGAR SERVICIO
====================================================== */
window.agregarServicio = async () => {

    const nombre = document.getElementById("nombre").value;
    const precio = document.getElementById("precio").value;
    const duracion = document.getElementById("duracion").value;
    const categoria = document.getElementById("categoria").value;

    if(!nombre || !precio || !duracion || !categoria){
        alert("Completa todos los campos ⚠️");
        return;
    }

    await addDoc(collection(db, "servicios"), {
        nombre,
        precio:Number(precio),
        duracion,
        categoria
    });

    alert("Servicio agregado 💖");

    location.reload();
};

/* ======================================================
   ELIMINAR SERVICIO
====================================================== */
window.eliminar = async(id) => {

    await deleteDoc(doc(db,"servicios",id));

    location.reload();
};

/* ======================================================
   EDITAR SERVICIO
====================================================== */
window.editar = async(id) => {

    const nombre = prompt("Nuevo nombre:");
    const precio = prompt("Nuevo precio:");
    const duracion = prompt("Nueva duración:");

    if(!nombre || !precio || !duracion) return;

    await updateDoc(doc(db,"servicios",id),{
        nombre,
        precio:Number(precio),
        duracion
    });

    location.reload();
};

/* ======================================================
   CARGAR CITAS
====================================================== */
async function cargarCitas(){

    const contenedor = document.getElementById("listaCitas");

    const citasSnap = await getDocs(collection(db,"citas"));

    const usuariosSnap = await getDocs(collection(db,"usuarios"));

    let html = "";

    citasSnap.forEach(docSnap => {

        const c = docSnap.data();
        const id = docSnap.id;

        let nombreCliente = "Cliente";

        usuariosSnap.forEach(userDoc => {

            const userData = userDoc.data();

            if(
                userData.email.trim().toLowerCase() ===
                c.usuario.trim().toLowerCase()
            ){
                nombreCliente = userData.nombre;
            }

        });

        html += `
            <div class="admin-card">

                <h3>${c.servicio}</h3>

                <p>👤 ${nombreCliente}</p>

                <p>📧 ${c.usuario}</p>

                <p>📅 ${c.fecha}</p>

                <p>⏰ ${c.hora}</p>

                <p>📍 ${c.direccion}</p>

                <p><strong>Estado:</strong> ${c.estado || "pendiente"}</p>

                <button onclick="aprobar('${id}')">
                    Aprobar ✅
                </button>

                <button onclick="rechazar('${id}')">
                    Rechazar ❌
                </button>

            </div>
        `;
    });

    contenedor.innerHTML = html;
}

/* ======================================================
   APROBAR CITA
====================================================== */
window.aprobar = async(id) => {

    await updateDoc(doc(db,"citas",id),{
        estado:"aprobado"
    });

    location.reload();
};

/* ======================================================
   RECHAZAR CITA
====================================================== */
window.rechazar = async(id) => {

    await updateDoc(doc(db,"citas",id),{
        estado:"rechazado"
    });

    location.reload();
};

</script>

</body>
</html>
