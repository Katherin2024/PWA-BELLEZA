<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body style="display:none;">

<header class="header">

<div class="logo">💅 Belleza Admin</div>

<nav class="menu">

<a href="#agregar">Agregar</a>
<a href="#servicios">Servicios</a>
<a href="#citas">Citas</a>

<button
class="btn-solid"
onclick="cerrarSesion()">
Cerrar sesión
</button>

</nav>

</header>

<h1 class="titulo">
Panel Administrador 👩‍💼
</h1>

<!-- AGREGAR -->
<section id="agregar">

<div class="admin-box">

<h2>Agregar Servicio 💅</h2>

<input type="text" id="nombre" placeholder="Nombre del servicio">
<input type="number" id="precio" placeholder="Precio">
<input type="text" id="duracion" placeholder="Duración">

<select id="categoria">

<option value="">Selecciona categoría</option>
<option value="uñas">Uñas</option>
<option value="cejas">Cejas</option>
<option value="depilacion">Depilación</option>
<option value="pestañas">Pestañas</option>
<option value="Maquillaje">Maquillaje</option>

</select>

<button onclick="agregarServicio()">
Agregar Servicio
</button>

</div>

</section>

<!-- SERVICIOS -->
<section id="servicios">

<h2 class="titulo">
Servicios Registrados 💖
</h2>

<div id="listaServicios" class="admin-list"></div>

</section>

<!-- CITAS -->
<section id="citas">

<h2 class="titulo">
Citas de Clientes 📅
</h2>

<div id="listaCitas" class="admin-list citas"></div>

</section>


<!-- Promociomes -->
<section>

<div class="admin-box">

<h2>Promociones 🎁</h2>

<input id="tituloPromo" placeholder="Título">
<input id="precioOriginal" placeholder="Precio original">
<input id="descuento" placeholder="% descuento">
<input id="serviciosPromo" placeholder="Servicios separados por coma">

<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">

<button onclick="crearPromo()">
Crear Promo
</button>

</div>

</section>


<a href="#agregar" class="btn-subir-admin">↑</a>

<!-- JS EXTERNO -->
<script type="module" src="js/admin.js"></script>

</body>
</html>
