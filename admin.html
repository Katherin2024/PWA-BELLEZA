<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body style="display:none;">

<header class="header">

<a href="index.html" class="logo">💅 Belleza Admin</a>

<nav class="menu">

<a href="#agregar">Agregar</a>
<a href="#servicios">Servicios</a>
<a href="#citas">Citas</a>

<button
class="btn-solid"
onclick="cerrarSesion()">
Cerrar sesión
</button>

</nav>

</header>

<h1 class="titulo">
Panel Administrador 👩‍💼
</h1>

<!-- AGREGAR -->
<section id="agregar">

<div class="admin-box">

<h2>Agregar Servicio 💅</h2>

<input type="text" id="nombre" placeholder="Nombre del servicio">
<input type="number" id="precio" placeholder="Precio">
<input type="text" id="duracion" placeholder="Duración">

<select id="categoria">

<option value="">Selecciona categoría</option>
<option value="uñas">Uñas</option>
<option value="cejas">Cejas</option>
<option value="depilacion">Depilación</option>
<option value="pestañas">Pestañas</option>
<option value="maquillaje">Maquillaje</option>

</select>

<button onclick="agregarServicio()">
Agregar Servicio
</button>

</div>

</section>

<!-- SERVICIOS -->
<section id="servicios">

<h2 class="titulo">
Servicios Registrados 💖
</h2>

<div id="listaServicios" class="admin-list"></div>

</section>

<!-- CITAS -->
<section id="citas">

<h2 class="titulo">
Citas de Clientes 📅
</h2>

<div id="listaCitas" class="admin-list citas"></div>

</section>

<!-- PROMOCIONES -->
<section id="promociones">

<div class="admin-box">

<h2>Promociones 🎁</h2>

<input type="text" id="tituloPromo" placeholder="Nombre promo">

<!-- LISTA SERVICIOS -->
<select id="serviciosPromo" multiple></select>

<!-- RESUMEN -->
<div class="resumen-promo">
<p id="totalServicios">Total servicios: $0</p>
<p id="descuentoTexto">Descuento: 0%</p>
<p id="precioFinal" class="total-final">Total final: $0</p>
</div>

<select id="descuentoPromo">
<option value="0">0%</option>
<option value="10">10%</option>
<option value="20">20%</option>
<option value="30">30%</option>
<option value="40">40%</option>
<option value="50">50%</option>
</select>

<input type="date" id="fechaInicio">
<input type="date" id="fechaFin">

<button onclick="crearPromo()">Guardar Promoción</button>

</div>

<h2 class="titulo">Promos creadas 💖</h2>
<div id="listaPromos" class="admin-list"></div>

</section>

<!-- REPORTES -->

<div class="admin-box">

<h3>Generar Reportes</h3>

<label>Fecha inicio</label>
<input type="date" id="fechaInicioReporte">

<label>Fecha fin</label>
<input type="date" id="fechaFinReporte">

<button id="btnReporte">
📊 Generar Reporte
</button>

<button id="btnExcel">
📥 Descargar Excel
</button>

</div>











<!-- GRAFICAS -->
<section id="graficas">

<h2 class="titulo">
Estadísticas 📊
</h2>

<div class="admin-box">

<canvas id="graficaServicios"></canvas>

</div>

<div class="admin-box">

<canvas id="graficaIngresos"></canvas>

</div>

</section>
























<a href="#agregar" class="btn-subir-admin">↑</a>

<!-- Libreria reportes -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<!-- Libreria Graficas -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- JS EXTERNO -->
<script type="module" src="js/admin.js"></script>

</body>
</html>
