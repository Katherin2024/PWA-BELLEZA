<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendar cita</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- BOTÓN VOLVER -->
<button class="btn-volver-float" onclick="volver()">⬅</button>

<!-- CONTENEDOR -->
<div class="container">

<h2>Agendar cita 📅</h2>

<!-- SERVICIOS -->
<input
type="text"
id="servicio"
readonly
placeholder="Servicios seleccionados">

<!-- DURACIÓN -->
<input
type="text"
id="duracion"
readonly
placeholder="Duración total">

<!-- AGREGAR EXTRA -->
<select id="otroServicio">

<option value="">
💅 Agregar otro servicio
</option>

</select>

<button
type="button"
onclick="agregarServicioExtra()">
+ Agregar servicio
</button>

<!-- FECHA -->
<input type="date" id="fecha">

<!-- HORA -->
<select id="hora">

<option value="">
⏰ Selecciona hora
</option>

</select>

<!-- DIRECCIÓN -->
<select id="direccion">

<option value="">
📍 Selecciona tu dirección
</option>

</select>

<!-- GUARDAR -->
<button onclick="guardarCita()">
Guardar cita
</button>

</div>

<!-- JS EXTERNO -->
<script type="module" src="js/agendar.js"></script>

</body>
</html>
