<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendar cita</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- BOTÓN VOLVER -->
<button class="btn-volver-float" onclick="volver()">⬅</button>

<!-- CONTENEDOR -->
<div class="container">

    <h2>Agendar cita 📅</h2>

    <!-- SERVICIO -->
    <input
        type="text"
        id="servicio"
        readonly
    >

    <!-- FECHA -->
    <input
        type="date"
        id="fecha"
    >

    <!-- HORA -->
    <input
        type="time"
        id="hora"
    >

    <!-- DIRECCIÓN -->
    <select id="direccion">

        <option value="">
            📍 Selecciona tu dirección
        </option>

    </select>

    <!-- BOTÓN -->
    <button onclick="guardarCita()">
        Guardar cita
    </button>

</div>

<!-- SCRIPT -->
<script type="module">

/* ======================================================
   IMPORTAR FIREBASE
====================================================== */
import {
    getFirestore,
    collection,
    addDoc,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { app } from "./js/firebase-config.js";

/* ======================================================
   INICIALIZAR
====================================================== */
const db = getFirestore(app);
const auth = getAuth(app);

/* ======================================================
   CARGAR SERVICIO
====================================================== */
const servicio =
localStorage.getItem("servicio") || "";

document.getElementById("servicio").value =
servicio;

/* ======================================================
   CARGAR DIRECCIONES DESDE FIREBASE
====================================================== */
onAuthStateChanged(auth, async(user) => {

    if(!user){

        alert("Debes iniciar sesión ⚠️");

        window.location.href = "login.html";

        return;
    }

    /* Buscar datos del usuario */
    const snap =
    await getDoc(doc(db,"usuarios",user.uid));

    if(snap.exists()){

        const data = snap.data();

        const select =
        document.getElementById("direccion");

        select.innerHTML =
        `<option value="">📍 Selecciona tu dirección</option>`;

        /* Dirección principal */
        if(data.direccion1){

            select.innerHTML += `
                <option value="${data.direccion1}">
                    ${data.direccion1}
                </option>
            `;
        }

        /* Dirección secundaria */
        if(data.direccion2){

            select.innerHTML += `
                <option value="${data.direccion2}">
                    ${data.direccion2}
                </option>
            `;
        }

    }

});

/* ======================================================
   GUARDAR CITA
====================================================== */
window.guardarCita = async () => {

    const fecha =
    document.getElementById("fecha").value;

    const hora =
    document.getElementById("hora").value;

    const direccion =
    document.getElementById("direccion").value;

    if(!fecha || !hora || !direccion){

        alert("Completa todos los campos ⚠️");

        return;
    }

    try{

        await addDoc(collection(db,"citas"),{

            usuario: auth.currentUser.email,

            servicio: servicio,

            fecha: fecha,

            hora: hora,

            direccion: direccion

        });

        alert("Cita agendada con éxito 💖");

        window.location.href = "index.html";

    }catch(error){

        alert("Error: " + error.message);

    }

};

/* ======================================================
   VOLVER
====================================================== */
window.volver = () => {

    window.location.href = "index.html";

};

</script>

</body>
</html>
