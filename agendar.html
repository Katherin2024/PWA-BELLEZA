<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendar cita</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- BOTÓN VOLVER -->
<button class="btn-volver-float" onclick="volver()">⬅</button>

<!-- CONTENEDOR -->
<div class="container">

    <h2>Agendar cita 📅</h2>

    <!-- SERVICIOS -->
    <input
    type="text"
    id="servicio"
    readonly
    placeholder="Servicios seleccionados"
    >

    <!-- DURACIÓN -->
    <input
    type="text"
    id="duracion"
    readonly
    placeholder="Duración total"
    >

    <!-- AGREGAR EXTRA -->
    <select id="otroServicio">

        <option value="">
        💅 Agregar otro servicio
        </option>

    </select>

    <button
    type="button"
    onclick="agregarServicioExtra()">
    + Agregar servicio
    </button>

    <!-- FECHA -->
    <input
    type="date"
    id="fecha"
    >

    <!-- HORA -->
    <select id="hora">

        <option value="">
        ⏰ Selecciona hora
        </option>

    </select>

    <!-- DIRECCIÓN -->
    <select id="direccion">

        <option value="">
        📍 Selecciona tu dirección
        </option>

    </select>

    <!-- GUARDAR -->
    <button onclick="guardarCita()">
    Guardar cita
    </button>

</div>

<script type="module">

/* =========================================
FIREBASE
========================================= */
import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { app }
from "./js/firebase-config.js";

/* =========================================
INICIALIZAR
========================================= */
const db =
getFirestore(app);

const auth =
getAuth(app);

/* =========================================
VARIABLES
========================================= */
const horasBase = [
"08:00","09:00","10:00","11:00",
"12:00","13:00","14:00","15:00","16:00"
];

const trayectoMin = 35;

let serviciosElegidos = [];
let serviciosFirebase = [];
let duracionTotal = 0;

/* =========================================
MINUTOS
========================================= */
function obtenerMinutos(texto){

texto = texto.toLowerCase();

if(texto.includes("120")) return 120;
if(texto.includes("90")) return 90;
if(texto.includes("60")) return 60;
if(texto.includes("40")) return 40;
if(texto.includes("30")) return 30;
if(texto.includes("2")) return 120;
if(texto.includes("1")) return 60;

return 60;

}

/* =========================================
FORMATO HORA
========================================= */
function formatoHora(hora){

let [h,m] = hora.split(":");

h = Number(h);

let ampm =
h >= 12 ? "PM" : "AM";

let hora12 =
h % 12;

if(hora12 === 0){
hora12 = 12;
}

return hora12 + ":" + m + " " + ampm;

}

/* =========================================
ACTUALIZAR VISTA
========================================= */
function actualizarVista(){

document.getElementById("servicio").value =
serviciosElegidos
.map(s => s.nombre)
.join(" + ");

document.getElementById("duracion").value =
duracionTotal + " min + trayecto";

}

/* =========================================
CARGAR SERVICIO PRINCIPAL
========================================= */
function cargarPrincipal(){

const nombre =
localStorage.getItem("servicio") || "";

const duracion =
localStorage.getItem("duracion") || "60";

const minutos =
obtenerMinutos(duracion);

serviciosElegidos.push({
nombre:nombre,
minutos:minutos
});

duracionTotal += minutos;

actualizarVista();

}

/* =========================================
CARGAR SERVICIOS FIREBASE
========================================= */
async function cargarServicios(){

const select =
document.getElementById("otroServicio");

const snap =
await getDocs(collection(db,"servicios"));

snap.forEach(docSnap=>{

const s = docSnap.data();

serviciosFirebase.push(s);

select.innerHTML += `
<option value="${s.nombre}">
${s.nombre}
</option>
`;

});

}

/* =========================================
AGREGAR EXTRA
========================================= */
window.agregarServicioExtra = ()=>{

const nombre =
document.getElementById("otroServicio").value;

if(!nombre){
alert("Selecciona un servicio ⚠️");
return;
}

if(serviciosElegidos.length >= 3){
alert("Máximo 3 servicios 💖");
return;
}

const repetido =
serviciosElegidos.some(
s => s.nombre === nombre
);

if(repetido){
alert("Ese servicio ya fue agregado ⚠️");
return;
}

const encontrado =
serviciosFirebase.find(
s => s.nombre === nombre
);

const minutos =
obtenerMinutos(encontrado.duracion);

serviciosElegidos.push({
nombre:nombre,
minutos:minutos
});

duracionTotal += minutos;

actualizarVista();

const fecha =
document.getElementById("fecha").value;

if(fecha){
cargarHorasDisponibles();
}

};

/* =========================================
HORAS DISPONIBLES
========================================= */
async function cargarHorasDisponibles(){

const fecha =
document.getElementById("fecha").value;

const select =
document.getElementById("hora");

select.innerHTML =
`<option value="">⏰ Selecciona hora</option>`;

if(!fecha) return;

const totalMin =
duracionTotal + trayectoMin;

const snap =
await getDocs(collection(db,"citas"));

horasBase.forEach(horaTexto=>{

const [h,m] =
horaTexto.split(":");

const inicioMin =
Number(h)*60 + Number(m);

const finMin =
inicioMin + totalMin;

if(finMin > 1080){
return;
}

let ocupado = false;

snap.forEach(docSnap=>{

const c = docSnap.data();

if(c.fecha === fecha){

if(
inicioMin < c.finMin &&
finMin > c.inicioMin
){
ocupado = true;
}

}

});

if(!ocupado){

select.innerHTML += `
<option value="${horaTexto}">
${formatoHora(horaTexto)}
</option>
`;

}

});

}

/* =========================================
USUARIO + DIRECCIONES
========================================= */
onAuthStateChanged(auth, async(user)=>{

if(!user){

alert("Debes iniciar sesión ⚠️");

window.location.href =
"login.html";

return;

}

const snap =
await getDoc(
doc(db,"usuarios",user.uid)
);

if(snap.exists()){

const data =
snap.data();

const select =
document.getElementById("direccion");

if(data.direccion1){

select.innerHTML += `
<option value="${data.direccion1}">
${data.direccion1}
</option>
`;

}

if(data.direccion2){

select.innerHTML += `
<option value="${data.direccion2}">
${data.direccion2}
</option>
`;

}

}

});

/* =========================================
GUARDAR CITA
========================================= */
window.guardarCita = async()=>{

const fecha =
document.getElementById("fecha").value;

const hora =
document.getElementById("hora").value;

const direccion =
document.getElementById("direccion").value;

if(!fecha || !hora || !direccion){

alert("Completa todos los campos ⚠️");
return;

}

const [h,m] =
hora.split(":");

const inicioMin =
Number(h)*60 + Number(m);

const finMin =
inicioMin +
duracionTotal +
trayectoMin;

try{

await addDoc(
collection(db,"citas"),
{
usuario:
auth.currentUser.email,

servicio:
serviciosElegidos
.map(s=>s.nombre)
.join(" + "),

fecha:
fecha,

hora:
hora,

direccion:
direccion,

duracionMin:
duracionTotal,

trayectoMin:
trayectoMin,

inicioMin:
inicioMin,

finMin:
finMin,

estado:
"pendiente"
}
);

/* WhatsApp automático */
const mensaje =
encodeURIComponent(
`Hola 💖 Nueva cita solicitada

👤 ${auth.currentUser.email}

💅 ${serviciosElegidos.map(s=>s.nombre).join(" + ")}

📅 ${fecha}
⏰ ${hora}
📍 ${direccion}

Revisar panel administrador ✨`
);

const linkWhats =
"https://wa.me/573227257705?text=" +
mensaje;

/* Pantalla final SIN calendar */
document.querySelector(".container").innerHTML = `

<h2>✅ Cita guardada 💖</h2>

<p>
Tu solicitud fue registrada con éxito.
</p>

<button onclick="window.open('${linkWhats}','_blank')">
📲 Enviar WhatsApp
</button>

`;

}catch(error){

alert(
"Error: " +
error.message
);

}

};

/* =========================================
EVENTO FECHA
========================================= */
document
.getElementById("fecha")
.addEventListener(
"change",
cargarHorasDisponibles
);

/* =========================================
VOLVER
========================================= */
window.volver = ()=>{

window.location.href =
"index.html";

};

/* =========================================
INICIAR
========================================= */
cargarPrincipal();
cargarServicios();

</script>

</body>
</html>
