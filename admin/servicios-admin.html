<!DOCTYPE html>
<html lang="es">
<head>

  <!-- Configuración básica -->
  <meta charset="UTF-8">
  <title>Admin Servicios</title>

</head>

<body>

  <!-- Título -->
  <h1>Panel de Servicios 💅</h1>

  <!-- ================= FORMULARIO ================= -->

  <!-- Campo nombre -->
  <input id="nombre" placeholder="Nombre del servicio">

  <!-- Campo precio -->
  <input id="precio" placeholder="Precio">

  <!-- Campo duración -->
  <input id="duracion" placeholder="Duración">

  <!-- Botón guardar -->
  <button onclick="guardar()">Guardar servicio</button>

  <!-- Línea divisora -->
  <hr>

  <!-- Contenedor lista -->
  <div id="lista"></div>

  <!-- ================= SCRIPT ================= -->
  <script type="module">

    // Importar funciones de Firestore
    import { 
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Importar configuración Firebase
    import { app } from "../js/firebase-config.js";

    // Inicializar base de datos
    const db = getFirestore(app);

    // Variable para saber si estamos editando
    let idEditar = null;

    // ================= GUARDAR O ACTUALIZAR =================
    window.guardar = async () => {

      // Obtener valores del formulario
      const nombre = document.getElementById("nombre").value;
      const precio = document.getElementById("precio").value;
      const duracion = document.getElementById("duracion").value;

      // Validar campos
      if (!nombre || !precio || !duracion) {
        alert("Completa todos los campos ❌");
        return;
      }

      // Si estamos editando
      if (idEditar) {

        // Referencia al documento
        const ref = doc(db, "servicios", idEditar);

        // Actualizar en Firebase
        await updateDoc(ref, {
          nombre: nombre,
          precio: precio,
          duracion: duracion
        });

        alert("Servicio actualizado ✏️");

        // Limpiar modo edición
        idEditar = null;

      } else {

        // Crear nuevo servicio
        await addDoc(collection(db, "servicios"), {
          nombre: nombre,
          precio: precio,
          duracion: duracion
        });

        alert("Servicio agregado ✅");
      }

      // Recargar lista
      location.reload();
    };

    // ================= MOSTRAR SERVICIOS =================

    const querySnapshot = await getDocs(collection(db, "servicios"));

    let html = "";

    querySnapshot.forEach(d => {

      // Obtener datos
      const s = d.data();

      html += `
        <div>

          <!-- Mostrar información -->
          <p><strong>${s.nombre}</strong></p>
          <p>Precio: $${s.precio}</p>
          <p>Duración: ${s.duracion}</p>

          <!-- Botón editar -->
          <button onclick="editar('${d.id}', '${s.nombre}', '${s.precio}', '${s.duracion}')">
            Editar ✏️
          </button>

          <!-- Botón eliminar -->
          <button onclick="eliminar('${d.id}')">
            Eliminar ❌
          </button>

          <hr>

        </div>
      `;
    });

    // Insertar en HTML
    document.getElementById("lista").innerHTML = html;

    // ================= EDITAR =================
    window.editar = (id, nombre, precio, duracion) => {

      // Guardar ID del servicio
      idEditar = id;

      // Cargar datos en formulario
      document.getElementById("nombre").value = nombre;
      document.getElementById("precio").value = precio;
      document.getElementById("duracion").value = duracion;

      // Mensaje visual
      alert("Editando servicio ✏️");
    };

    // ================= ELIMINAR =================
    window.eliminar = async (id) => {

      // Confirmación
      if (!confirm("¿Eliminar servicio?")) return;

      // Eliminar de Firebase
      await deleteDoc(doc(db, "servicios", id));

      alert("Servicio eliminado ❌");

      // Recargar
      location.reload();
    };

  </script>

</body>
</html>
