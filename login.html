<!DOCTYPE html>
<html lang="es">
<head>

  <!-- Configuración básica -->
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<!-- ================= CONTENEDOR ================= -->
<div class="container">

  <!-- TÍTULO -->
  <h1>Iniciar Sesión 💖</h1>

  <!-- INPUT CORREO -->
  <input 
    type="email" 
    id="email" 
    placeholder="Correo electrónico"
  >

  <!-- INPUT CONTRASEÑA -->
  <input 
    type="password" 
    id="password" 
    placeholder="Contraseña"
  >

  <!-- BOTÓN LOGIN -->
  <button onclick="iniciarSesion()">
    Ingresar
  </button>

  <!-- LINK REGISTRO -->
  <p>
    ¿No tienes cuenta? 
    <a href="registro.html">Regístrate</a>
  </p>

  <!-- RECUPERAR CONTRASEÑA (SIN REDIRECCIÓN) -->
  <p>
    <a href="#" onclick="recuperarPassword()">
      ¿Olvidaste tu contraseña?
    </a>
  </p>

</div>

<!-- ================= SCRIPT ================= -->
<script type="module">

// ================= IMPORTAR FIREBASE =================
import {
  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { app } from "./js/firebase-config.js";

// ================= INICIALIZAR =================
const auth = getAuth(app);
const db = getFirestore(app);

// ================= LOGIN =================
window.iniciarSesion = async () => {

  // Obtener datos del formulario
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // Validación
  if(!email || !password){
    alert("Completa los campos ⚠️");
    return;
  }

  try {

    // Iniciar sesión
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Consultar rol en Firestore
    const docRef = doc(db, "usuarios", user.uid);
    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){

      const data = docSnap.data();

      // Redirección según rol
      if(data.rol === "admin"){
        window.location.href = "admin.html";
      } else {
        window.location.href = "index.html";
      }

    }

  } catch (error) {

    alert("Error: " + error.message);

  }

};

// ================= RECUPERAR CONTRASEÑA =================
window.recuperarPassword = async () => {

  const email = document.getElementById("email").value;

  // Validar que haya correo
  if(!email){
    alert("Ingresa tu correo primero 📧");
    return;
  }

  try {

    // Enviar correo de recuperación
    await sendPasswordResetEmail(auth, email);

    alert("Correo enviado 💌 Revisa tu bandeja");

  } catch (error) {

    alert("Error: " + error.message);

  }

};

</script>

</body>
</html>
