<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Belleza</title>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header">

    <!-- Logo -->
    <div class="logo">
      💅 <span>PWA Belleza</span>
    </div>

    <!-- Menú -->
    <nav class="menu">

      <a href="servicios.html">Servicios</a>
      <a href="mis-citas.html" class="btn-outline">Mis citas</a>      
      <!-- Login -->
      <button id="btnLogin" class="btn-outline" onclick="irLogin()">Login</button>

      <!-- Logout -->
      <button id="btnLogout" class="btn-solid" onclick="cerrarSesion()">Cerrar Sesion</button>

    </nav>

  </header>

  <!-- Saludo -->
  <h2 id="saludo" class="saludo"></h2>

  <!-- ================= SCRIPT ================= -->
  <script type="module">

    import { getAuth, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    import { app } from "./js/firebase-config.js";

    const auth = getAuth(app);

    // Mostrar botones dinámicos
    onAuthStateChanged(auth, (user) => {

      if (user) {
        document.getElementById("btnLogin").style.display = "none";
        document.getElementById("btnLogout").style.display = "inline-block";
        document.getElementById("saludo").innerText = "Bienvenid@ 💖";
      } else {
        document.getElementById("btnLogin").style.display = "inline-block";
        document.getElementById("btnLogout").style.display = "none";
        document.getElementById("saludo").innerText = "Explora nuestros servicios 💅";
      }

    });

    window.irLogin = () => {
      window.location.href = "login.html";
    };

    window.cerrarSesion = () => {
      signOut(auth).then(() => location.reload());
    };

  </script>

</body>
</html>
