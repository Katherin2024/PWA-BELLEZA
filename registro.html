<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Crear Cuenta 💖</h1>

<input
type="text"
id="nombre"
placeholder="Nombre completo">

<input
type="email"
id="email"
placeholder="Correo electrónico">

<!-- CONTRASEÑA -->
<div class="pass-box">

<input
type="password"
id="password"
placeholder="Contraseña"
class="pass-real">

<span
class="eye-real"
onclick="mostrarClave()">
👁️ Ver
</span>

</div>

<input
type="text"
id="telefono"
placeholder="Teléfono">

<input
type="text"
id="direccion1"
placeholder="Dirección principal">

<input
type="text"
id="direccion2"
placeholder="Dirección opcional">

<button onclick="registrarUsuario()">
Registrarse
</button>

<p>
¿Ya tienes cuenta?
<a href="login.html">
Iniciar sesión
</a>
</p>

</div>

<script type="module" src="js/registro.js"></script>

</body>
</html>
