<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis citas</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- BOTÓN VOLVER -->
<button class="btn-volver-float" onclick="volver()">⬅</button>

<!-- TÍTULO -->
<h2 class="titulo">Mis citas 💖</h2>

<!-- CONTENEDOR -->
<div class="mis-citas-wrap">

    <!-- LISTA DE CITAS -->
    <div id="listaCitas" class="mis-citas-grid"></div>

</div>

<script type="module">

/* ======================================================
   IMPORTAR FIREBASE
====================================================== */
import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { app } from "./js/firebase-config.js";

/* ======================================================
   INICIALIZAR
====================================================== */
const db = getFirestore(app);
const auth = getAuth(app);

/* ======================================================
   CARGAR CITAS
====================================================== */
async function cargarCitas(user){

    const contenedor =
    document.getElementById("listaCitas");

    const querySnapshot =
    await getDocs(collection(db,"citas"));

    let html = "";

    querySnapshot.forEach((docSnap)=>{

        const cita = docSnap.data();
        const id = docSnap.id;

        if(cita.usuario === user.email){

            html += `
                <div class="mis-cita-card">

                    <h3>${cita.servicio}</h3>

                    <p>📅 ${cita.fecha}</p>

                    <p>⏰ ${cita.hora}</p>

                    <p>📍 ${cita.direccion}</p>

                    <p class="estado-cita">
                        Estado:
                        ${cita.estado || "pendiente"}
                    </p>

                    <button onclick="cancelarCita('${id}')">
                        Cancelar ❌
                    </button>

                </div>
            `;
        }

    });

    /* Sin citas */
    if(html === ""){

        html = `
            <div class="mis-cita-card">
                <h3>No tienes citas 💔</h3>
                <p>Agenda una nueva cita cuando quieras.</p>
            </div>
        `;
    }

    contenedor.innerHTML = html;
}

/* ======================================================
   VALIDAR SESIÓN
====================================================== */
onAuthStateChanged(auth,(user)=>{

    if(!user){

        alert("Debes iniciar sesión ⚠️");

        window.location.href = "login.html";

        return;
    }

    cargarCitas(user);

});

/* ======================================================
   CANCELAR CITA
====================================================== */
window.cancelarCita = async(id)=>{

    const confirmar =
    confirm("¿Cancelar esta cita?");

    if(!confirmar) return;

    try{

        await deleteDoc(doc(db,"citas",id));

        alert("Cita cancelada 💔");

        location.reload();

    }catch(error){

        alert("Error: " + error.message);

    }

};

/* ======================================================
   VOLVER
====================================================== */
window.volver = ()=>{

    window.location.href = "index.html";

};

</script>

</body>
</html>
